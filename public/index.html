<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iKunnect CRM Chat Interface</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🚀 iKunnect CRM Integration</h1>
            <p>Test your CRM MCP int with real-time chat</p>
        </div>

        <div class="setup-form" id="setupForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="userName">Your Name</label>
                    <input type="text" id="userName" placeholder="Enter your name" value="John Doe">
                </div>
                <div class="form-group">
                    <label for="userEmail">Email</label>
                    <input type="email" id="userEmail" placeholder="your@email.com" value="john@example.com">
                </div>
                <div class="form-group">
                    <label for="userPhone">Phone (Optional)</label>
                    <input type="tel" id="userPhone" placeholder="+1234567890" value="+1234567890">
                </div>
            </div>

            <div style="margin-top: 15px;">
                <button class="btn" onclick="startChat()">Start Chat Session</button>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages"></div>

        <div class="chat-input">
            <div class="input-row">
                <input type="text" class="message-input" id="messageInput" placeholder="Type your message..." disabled>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
